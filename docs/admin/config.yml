backend:
  name: github
  repo: auerbachs/BMDExpress-3
  branch: main
media_folder: "docs/assets/images"
public_folder: "assets/images"
site_url: https://auerbachs.github.io/BMDExpress-3

collections:
  - name: "pages"
    label: "Documentation Pages"
    files:
      - label: "Home"
        name: "index"
        file: "docs/index.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Navigation Order", name: "nav_order", widget: "number" }
          - { label: "Content", name: "body", widget: "markdown" }

      - label: "Overview of the Main View"
        name: "overview"
        file: "docs/overview.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Navigation Order", name: "nav_order", widget: "number" }
          - { label: "Content", name: "body", widget: "markdown" }

      - label: "How to Use the Application"
        name: "how-to-use"
