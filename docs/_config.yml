title: BMDExpress 3 Documentation
description: Documentation for BMDExpress 3 - Benchmark Dose Analysis Software
remote_theme: just-the-docs/just-the-docs

url: https://auerbachs.github.io
baseurl: /BMDExpress-3

# Enable search
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# Sidebar navigation
nav_enabled: true

# Aux links (top right)
aux_links:
  "BMDExpress 3 on GitHub":
    - "https://github.com/auerbachs/BMDExpress-3"

aux_links_new_tab: true

# Color scheme (light by default)
color_scheme: light

# Footer
footer_content: "BMDExpress 3 Documentation. Copyright &copy; 2024."

# Back to top link
back_to_top: true
back_to_top_text: "Back to top"

# Heading anchor links
heading_anchors: true

# External navigation links
nav_external_links:
  - title: Download BMDExpress 3
    url: https://github.com/auerbachs/BMDExpress-3/releases
    hide_icon: false

# Exclude files from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
